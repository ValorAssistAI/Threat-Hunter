kind = "web"
previewPath = "/"
title = "ArnieAI Vulnerability Agent"
version = "1.0.0"
id = "artifacts/arnievulnai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22309

[services.development]
run = "pnpm --filter @workspace/arnievulnai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arnievulnai", "run", "build" ]
publicDir = "artifacts/arnievulnai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22309"
BASE_PATH = "/"
