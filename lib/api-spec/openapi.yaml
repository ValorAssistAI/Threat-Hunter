openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ArnieAI Vulnerability Agent API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: agent
    description: Autonomous AI agent sessions with scope-gated tool permissions
  - name: anthropic
    description: Anthropic AI chat operations
  - name: dashboard
    description: Dashboard summary
  - name: guardduty
    description: GuardDuty findings
  - name: inspector
    description: Inspector v2 findings
  - name: securityhub
    description: Security Hub findings
  - name: artifacts
    description: S3 artifact management
  - name: logs
    description: CloudWatch log access
  - name: threat-intel
    description: Threat intelligence and VirusTotal lookups
  - name: scans
    description: Scan results management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard summary
      description: Returns high-level counts and status of all connected AWS services
      responses:
        "200":
          description: Dashboard summary data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /security/guardduty/findings:
    get:
      operationId: listGuardDutyFindings
      tags: [guardduty]
      summary: List GuardDuty findings
      parameters:
        - name: severity
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: number
      responses:
        "200":
          description: List of GuardDuty findings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GuardDutyFinding"

  /security/inspector/findings:
    get:
      operationId: listInspectorFindings
      tags: [inspector]
      summary: List Inspector v2 findings
      parameters:
        - name: severity
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: number
      responses:
        "200":
          description: List of Inspector findings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InspectorFinding"

  /security/securityhub/findings:
    get:
      operationId: listSecurityHubFindings
      tags: [securityhub]
      summary: List Security Hub findings
      parameters:
        - name: severity
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: number
      responses:
        "200":
          description: List of Security Hub findings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SecurityHubFinding"

  /artifacts:
    get:
      operationId: listArtifactFolders
      tags: [artifacts]
      summary: List S3 artifact folders with counts
      responses:
        "200":
          description: S3 bucket folder listing
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArtifactFolder"

  /artifacts/{folder}:
    get:
      operationId: listArtifactsByFolder
      tags: [artifacts]
      summary: List objects in an S3 folder
      parameters:
        - name: folder
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of S3 objects in folder
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArtifactObject"
        "404":
          description: Folder not found

  /artifacts/{folder}/{key}/url:
    get:
      operationId: getArtifactDownloadUrl
      tags: [artifacts]
      summary: Get presigned download URL for an S3 object
      parameters:
        - name: folder
          in: path
          required: true
          schema:
            type: string
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Presigned URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresignedUrl"

  /logs/groups:
    get:
      operationId: listLogGroups
      tags: [logs]
      summary: List CloudWatch log groups
      responses:
        "200":
          description: List of CloudWatch log groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogGroup"

  /logs/events:
    get:
      operationId: getLogEvents
      tags: [logs]
      summary: Get log events from a CloudWatch log group
      parameters:
        - name: group
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: number
        - name: startTime
          in: query
          schema:
            type: number
      responses:
        "200":
          description: Log events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogEvent"

  /threat-intel:
    get:
      operationId: listThreatIntelItems
      tags: [threat-intel]
      summary: List threat intelligence items from S3
      responses:
        "200":
          description: Threat intel items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArtifactObject"

  /threat-intel/lookup:
    get:
      operationId: virusTotalLookup
      tags: [threat-intel]
      summary: Lookup a file hash or IP/domain on VirusTotal
      parameters:
        - name: ioc
          in: query
          required: true
          schema:
            type: string
          description: Hash (MD5/SHA1/SHA256), IP address, or domain to look up
      responses:
        "200":
          description: VirusTotal analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirusTotalResult"
        "400":
          description: Invalid IOC

  /agent/sessions:
    get:
      operationId: listAgentSessions
      tags: [agent]
      summary: List all agent sessions
      responses:
        "200":
          description: List of agent sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentSession"
    post:
      operationId: createAgentSession
      tags: [agent]
      summary: Create a new agent session with scope definition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentSessionBody"
      responses:
        "201":
          description: Created agent session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSession"

  /agent/sessions/{id}:
    get:
      operationId: getAgentSession
      tags: [agent]
      summary: Get an agent session with messages and tool invocations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agent session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSessionDetail"
        "404":
          description: Not found
    delete:
      operationId: deleteAgentSession
      tags: [agent]
      summary: Delete an agent session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /agent/sessions/{id}/run:
    post:
      operationId: runAgentSession
      tags: [agent]
      summary: Start autonomous agent run (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSE stream of agent thoughts, tool calls, and results
          content:
            text/event-stream: {}
        "404":
          description: Not found

  /agent/sessions/{id}/message:
    post:
      operationId: sendAgentMessage
      tags: [agent]
      summary: Send a message to the agent (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendAgentMessageBody"
      responses:
        "200":
          description: SSE stream of agent response
          content:
            text/event-stream: {}
        "404":
          description: Not found

  /agent/sessions/{id}/tool-invocations:
    get:
      operationId: listToolInvocations
      tags: [agent]
      summary: List tool invocations for a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tool invocation log
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ToolInvocationRecord"

  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnthropicConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"
  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Not found
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
  /anthropic/conversations/{id}/messages:
    get:
      operationId: listAnthropicMessages
      tags: [anthropic]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicMessage"
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendAnthropicMessageBody"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

  /scans:
    get:
      operationId: listScanResults
      tags: [scans]
      summary: List scan results from S3
      responses:
        "200":
          description: Scan results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArtifactObject"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DashboardSummary:
      type: object
      properties:
        guardduty:
          $ref: "#/components/schemas/ServiceSummary"
        inspector:
          $ref: "#/components/schemas/ServiceSummary"
        securityhub:
          $ref: "#/components/schemas/ServiceSummary"
        s3:
          $ref: "#/components/schemas/S3Summary"
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
      required:
        - guardduty
        - inspector
        - securityhub
        - s3
        - recentActivity

    ServiceSummary:
      type: object
      properties:
        status:
          type: string
        total:
          type: number
        critical:
          type: number
        high:
          type: number
        medium:
          type: number
        low:
          type: number
      required:
        - status
        - total
        - critical
        - high
        - medium
        - low

    S3Summary:
      type: object
      properties:
        bucket:
          type: string
        folders:
          type: array
          items:
            $ref: "#/components/schemas/ArtifactFolder"
      required:
        - bucket
        - folders

    ArtifactFolder:
      type: object
      properties:
        name:
          type: string
        count:
          type: number
        lastModified:
          type: ["string", "null"]
      required:
        - name
        - count
        - lastModified

    ArtifactObject:
      type: object
      properties:
        key:
          type: string
        folder:
          type: string
        size:
          type: number
        lastModified:
          type: string
        etag:
          type: ["string", "null"]
      required:
        - key
        - folder
        - size
        - lastModified
        - etag

    PresignedUrl:
      type: object
      properties:
        url:
          type: string
        expiresIn:
          type: number
      required:
        - url
        - expiresIn

    LogGroup:
      type: object
      properties:
        name:
          type: string
        retentionDays:
          type: ["number", "null"]
        storedBytes:
          type: ["number", "null"]
      required:
        - name
        - retentionDays
        - storedBytes

    LogEvent:
      type: object
      properties:
        timestamp:
          type: number
        message:
          type: string
        ingestionTime:
          type: ["number", "null"]
      required:
        - timestamp
        - message
        - ingestionTime

    ActivityItem:
      type: object
      properties:
        id:
          type: string
        source:
          type: string
        title:
          type: string
        severity:
          type: string
        timestamp:
          type: string
      required:
        - id
        - source
        - title
        - severity
        - timestamp

    GuardDutyFinding:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        severity:
          type: number
        severityLabel:
          type: string
        type:
          type: string
        region:
          type: string
        accountId:
          type: string
        resourceType:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
        count:
          type: number
      required:
        - id
        - title
        - description
        - severity
        - severityLabel
        - type
        - region
        - accountId
        - resourceType
        - createdAt
        - updatedAt
        - count

    InspectorFinding:
      type: object
      properties:
        arn:
          type: string
        title:
          type: string
        description:
          type: string
        severity:
          type: string
        status:
          type: string
        type:
          type: string
        resourceType:
          type: ["string", "null"]
        resourceId:
          type: ["string", "null"]
        cveId:
          type: ["string", "null"]
        cvssScore:
          type: ["number", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - arn
        - title
        - description
        - severity
        - status
        - type
        - resourceType
        - resourceId
        - cveId
        - cvssScore
        - createdAt
        - updatedAt

    SecurityHubFinding:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        severity:
          type: string
        severityScore:
          type: number
        status:
          type: string
        productName:
          type: ["string", "null"]
        resourceType:
          type: ["string", "null"]
        resourceId:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - description
        - severity
        - severityScore
        - status
        - productName
        - resourceType
        - resourceId
        - createdAt
        - updatedAt

    AgentSession:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          type: string
        conversationId:
          type: ["integer", "null"]
        scopeInTargets:
          type: string
        scopeOutTargets:
          type: string
        conditions:
          type: string
        objectives:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - status
        - conversationId
        - scopeInTargets
        - scopeOutTargets
        - conditions
        - objectives
        - createdAt
        - updatedAt

    AgentSessionDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          type: string
        conversationId:
          type: ["integer", "null"]
        scopeInTargets:
          type: string
        scopeOutTargets:
          type: string
        conditions:
          type: string
        objectives:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicMessage"
        toolInvocations:
          type: array
          items:
            $ref: "#/components/schemas/ToolInvocationRecord"
      required:
        - id
        - name
        - status
        - conversationId
        - scopeInTargets
        - scopeOutTargets
        - conditions
        - objectives
        - createdAt
        - updatedAt
        - messages
        - toolInvocations

    CreateAgentSessionBody:
      type: object
      properties:
        name:
          type: string
        scopeInTargets:
          type: array
          items:
            type: string
        scopeOutTargets:
          type: array
          items:
            type: string
        conditions:
          type: string
        objectives:
          type: string
      required:
        - name
        - scopeInTargets
        - objectives

    SendAgentMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    ToolInvocationRecord:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        toolName:
          type: string
        toolInput:
          type: string
        toolOutput:
          type: string
        scopeAllowed:
          type: boolean
        scopeReason:
          type: string
        createdAt:
          type: string
      required:
        - id
        - sessionId
        - toolName
        - toolInput
        - toolOutput
        - scopeAllowed
        - scopeReason
        - createdAt

    AnthropicConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
      required:
        - id
        - title
        - createdAt

    AnthropicMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    CreateAnthropicConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    SendAnthropicMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    AnthropicConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    VirusTotalResult:
      type: object
      properties:
        ioc:
          type: string
        iocType:
          type: string
        malicious:
          type: number
        suspicious:
          type: number
        undetected:
          type: number
        harmless:
          type: number
        total:
          type: number
        reputation:
          type: ["number", "null"]
        lastAnalysisDate:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        permalink:
          type: ["string", "null"]
      required:
        - ioc
        - iocType
        - malicious
        - suspicious
        - undetected
        - harmless
        - total
        - reputation
        - lastAnalysisDate
        - tags
        - permalink
